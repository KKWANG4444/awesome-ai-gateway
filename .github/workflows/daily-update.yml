name: Daily update

on:
  schedule:
    # 02:23 UTC daily = 10:23 Beijing time
    - cron: '23 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Refresh star counts and releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py

      - name: Rebuild the release feed from refreshed data
        run: python scripts/build_feed.py

      - name: Commit if content changed
        run: |
          if git diff --quiet; then
            echo "No content changes today."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md README.zh-CN.md data/releases.json feed.xml
            git commit -m "docs: daily refresh — stars & releases ($(date -u +%F))"
            git push
          fi

      # Push the sitemap URLs to IndexNow so Bing (→ ~87% of ChatGPT Search
      # citations) keeps them in its crawl queue. The key is public by design;
      # non-blocking so a transient IndexNow hiccup never reds the daily job.
      - name: Ping IndexNow (Bing/Yandex discovery)
        run: python scripts/ping_indexnow.py
        continue-on-error: true

      # Blocking nag: the auto-refresh above keeps stars/releases current, but the
      # pricing/scorecard snapshots are hand-reviewed. If they rot past 30 days the
      # daily run goes red (the data is already pushed above) so the maintainer is
      # prompted to actually re-review and bump 'as_of' — not to fake the date.
      - name: Snapshots are still fresh
        run: python scripts/check_freshness.py --max-age-days 30
