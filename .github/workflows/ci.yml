name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Unit tests
        run: python -m unittest discover -s scripts -p 'test_*.py' -v
      - name: Cost tables match data/models.json
        run: |
          python scripts/cost_calc.py
          git diff --exit-code BENCHMARKS.md BENCHMARKS.zh-CN.md || {
            echo "::error::Cost tables are stale — run 'python scripts/cost_calc.py' after editing data/models.json"; exit 1;
          }
      - name: CSV exports match the data
        run: |
          python scripts/export_csv.py
          git diff --exit-code data/cost_table.csv data/gateways_scorecard.csv || {
            echo "::error::CSV exports are stale — run 'python scripts/export_csv.py' after editing the data"; exit 1;
          }

  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      # Advisory while the list stabilizes: the pain-point layout intentionally
      # violates some awesome-lint rules (cross-section entries, em-dash
      # separators). Full conformance is scheduled before the
      # sindresorhus/awesome submission (day 30), when this becomes blocking.
      - name: awesome-lint (advisory)
        run: |
          npx --yes awesome-lint && echo "awesome-lint clean" || \
            echo "::warning::awesome-lint reported issues — advisory until the day-30 awesome submission"
