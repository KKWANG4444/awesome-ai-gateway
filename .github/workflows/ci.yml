name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Unit tests
        run: python -m unittest discover -s scripts -p 'test_*.py' -v
      - name: Cost tables match data/models.json
        run: |
          python scripts/cost_calc.py
          git diff --exit-code BENCHMARKS.md BENCHMARKS.zh-CN.md || {
            echo "::error::Cost tables are stale — run 'python scripts/cost_calc.py' after editing data/models.json"; exit 1;
          }
      - name: CSV exports match the data
        run: |
          python scripts/export_csv.py
          git diff --exit-code data/cost_table.csv data/gateways_scorecard.csv || {
            echo "::error::CSV exports are stale — run 'python scripts/export_csv.py' after editing the data"; exit 1;
          }
      # Advisory on PRs (a contributor's change shouldn't be blocked because the
      # pricing snapshot drifted) — the blocking nag lives in the daily job.
      - name: Data snapshots are fresh (advisory)
        run: |
          python scripts/check_freshness.py --max-age-days 30 || \
            echo "::warning::Pricing/scorecard snapshot is stale — re-review and bump 'as_of' (enforced in the daily job)"
      - name: Compare HTML + sitemap match compare/*.md
        run: |
          python scripts/build_compare_html.py --check || {
            echo "::error::compare/*.html or sitemap.xml are stale — run 'python scripts/build_compare_html.py' after editing compare/*.md"; exit 1;
          }
      - name: Production-reality JSON matches BENCHMARKS Part 5
        run: |
          python scripts/build_reality.py --check || {
            echo "::error::data/gateway_reality.json is stale — run 'python scripts/build_reality.py' after editing BENCHMARKS.md Part 5"; exit 1;
          }
      - name: llms.txt matches the comparison set
        run: |
          python scripts/build_llms_txt.py --check || {
            echo "::error::llms.txt is stale — run 'python scripts/build_llms_txt.py' after adding/removing a compare article"; exit 1;
          }
      - name: feed.xml matches data/releases.json
        run: |
          python scripts/build_feed.py --check || {
            echo "::error::feed.xml is stale — run 'python scripts/build_feed.py' after data/releases.json changes"; exit 1;
          }

  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      # Advisory on purpose. Most findings are design tensions (compact wide
      # tables, a TOC that double-links sections, em-dash entry style), not
      # defects — see docs/awesome-lint-triage.md for the categorized breakdown
      # and the path to a sindresorhus/awesome submission. Flip to blocking once
      # that conformance pass is done.
      - name: awesome-lint (advisory)
        run: |
          npx --yes awesome-lint && echo "awesome-lint clean" || \
            echo "::warning::awesome-lint reported issues — triaged in docs/awesome-lint-triage.md (advisory until the conformance pass)"
