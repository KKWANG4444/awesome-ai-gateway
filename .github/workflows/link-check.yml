name: Link check

# Keeps the curated list credible: catches dead/typo'd links in the README,
# benchmarks and comparison pages — on every PR (incl. contributor-added links)
# and weekly (link rot). Advisory for now; becomes a hard gate before the
# sindresorhus/awesome submission, which requires green links.

on:
  pull_request:
    paths:
      - '**/*.md'
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check links (advisory)
        uses: lycheeverse/lychee-action@v2
        with:
          # Accept bot-blocking codes (403/429/999) to cut false positives from
          # sites that reject CI user-agents; localhost examples are excluded.
          args: >-
            --no-progress
            --max-concurrency 4
            --max-retries 2
            --retry-wait-time 5
            --accept 200..=299,403,429,999
            --exclude localhost
            --exclude 127.0.0.1
            README.md README.zh-CN.md BENCHMARKS.md BENCHMARKS.zh-CN.md
            CONTRIBUTING.md 'compare/**/*.md' 'docs/**/*.md'
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
